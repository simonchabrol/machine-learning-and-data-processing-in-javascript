<div style="width: 90%; max-width: 500px; margin: auto;">
  <canvas id="myChart"></canvas>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0"></script>
<script>
    // Bruit gaussien (Box-Muller)
    function gaussianNoise() {
        var u = 0, v = 0;
        while (u === 0) u = Math.random();
        while (v === 0) v = Math.random();
        return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
    }

    var noiseLevel = 0.008;

    var Data = []
    var Input = []

    for (var i = 0; i < 10; i++) {
          var x = Math.random()
          var y = Math.random()
          Data.push({x:x, y:y})
          Input.push([x,y])
    }

    Input.sort(function (a,b) {
       var c
       a.some(function (d,i) {
         return c = d - b[i]
       })
       return c
    })

    for (var i = 0; i < Input.length-1; i++) {
        for (var j = 0; j < 10; j++) {
           var x = Math.random()*(Input[i+1][0]-Input[i][0])+Input[i][0]
           var y = Input[i][1] + (x - Input[i][0]) * ( (Input[i+1][1] - Input[i][1]) /  (Input[i+1][0] - Input[i][0]) )
           Data.push({
               x: Math.max(0, Math.min(1, x + gaussianNoise() * noiseLevel)),
               y: Math.max(0, Math.min(1, y + gaussianNoise() * noiseLevel))
           })
        }
    }

    var DataSet = [{
        borderColor: 'rgb(0, 0, 255)',
        backgroundColor: 'rgb(0, 0, 255)',
        label: 'TEST DATA',
        data: Data,
    }]

    var ctx = document.getElementById('myChart').getContext('2d');
    var scatterChart = new Chart(ctx, {
        type: 'scatter',
        data: {
            datasets: DataSet
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            aspectRatio: 1,
            scales: {
                xAxes: [{
                    type: 'linear',
                    position: 'bottom'
                }]
            }
        }
    })
</script>
